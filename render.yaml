services:
  - type: web
    name: quiz-extractor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # valor secreto — se ingresa manualmente en Render
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        sync: false          # se completa con la URL de Vercel después del deploy
      - key: MAX_FILE_SIZE_MB
        value: "15"
    healthCheckPath: /docs
